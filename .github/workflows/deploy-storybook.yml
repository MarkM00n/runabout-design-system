name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # dashboard-data.generated.json is derived from full merge/commit
          # history (git log --merges, --follow), not just the tip commit —
          # a shallow clone would silently make every cycle-time number null.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # design-sync validates every component (token compliance, a11y,
      # Storybook coverage, documentation coverage), generates any missing
      # documentation, and builds Storybook as its own regenerate-docs step
      # — so this single command both gates the deploy on validation passing
      # and produces storybook-static/. A bare `build-storybook` would skip
      # that gate entirely.
      - run: npm run design-sync
      - name: Regenerate dashboard data
        run: npm run dashboard-data
      - name: Commit dashboard data if changed
        run: |
          if git diff --quiet -- src/design-docs/dashboard-data.generated.json; then
            echo "dashboard-data.generated.json unchanged — nothing to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/design-docs/dashboard-data.generated.json
            # GITHUB_TOKEN-authored pushes don't trigger further workflow
            # runs (GitHub's built-in loop guard), but [skip ci] is kept as
            # a second line of defense in case the push credential ever
            # changes to a PAT.
            git commit -m "chore: regenerate dashboard data [skip ci]"

            # Two merges landing within seconds of each other can move main
            # out from under this job between checkout and push — a real
            # failure seen in production (PR #11 and #12 merging back to
            # back), not a hypothetical. Retry with a rebase onto the latest
            # main rather than failing the job over a conflict that isn't
            # real: this commit only ever touches one generated file, so a
            # rebase here is always clean in practice.
            pushed=false
            for attempt in 1 2 3 4 5; do
              if git push origin HEAD:main; then
                pushed=true
                break
              fi
              echo "Push rejected (attempt $attempt) — main moved, rebasing and retrying."
              git fetch origin main
              git rebase origin/main
            done
            if [ "$pushed" != true ]; then
              echo "::error::Failed to push dashboard data after 5 attempts."
              exit 1
            fi
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
