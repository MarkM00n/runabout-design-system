name: Validation report PR comment

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Informational, not a merge gate: a PR that intentionally introduces a
      # FAIL (e.g. a work-in-progress component) should still get a comment
      # showing that, not a red X that looks like a broken pipeline.
      - name: Run design-sync
        continue-on-error: true
        run: npm run design-sync
      - name: Format validation comment
        # Direct node invocation, not `npm run` — npm prints its own "> pkg@ver
        # script\n> node ..." banner to stdout ahead of the script's real
        # output, which would land inside the PR comment body verbatim.
        run: node scripts/format-validation-comment.js > /tmp/validation-comment.md
      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file /tmp/validation-comment.md \
            --edit-last \
            --create-if-none
